name: newslingo
description: "NewsLingo - Learn English from real news"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Backend
  supabase_flutter: ^2.8.1

  # Navigation
  go_router: ^14.0.0

  # Dependency Injection
  get_it: ^7.7.0

  # Value Equality
  equatable: ^2.0.5

  # Internationalization
  intl: ^0.20.2

  # Audio
  just_audio: ^0.9.37
  flutter_tts: ^4.1.0
  speech_to_text: ^7.0.0

  # UI Helpers
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_screenutil: ^5.9.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.0

  # Environment
  flutter_dotenv: ^5.2.1

  # HTTP
  http: ^1.2.0

  # Notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - .env

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies,
  # see https://flutter.dev/to/asset-from-package

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
          weight: 400
        - asset: fonts/Cairo-Medium.ttf
          weight: 500
        - asset: fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
